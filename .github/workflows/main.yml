name: Keyword Notification Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

# 깃허브 액션이 레포지토리의 last_id.txt 파일을 수정할 수 있도록 쓰기 권한 부여
permissions:
  contents: write

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 코드 가져오기
        uses: actions/checkout@v3

      - name: 파이썬 환경 설정
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 필요한 라이브러리 설치
        run: |
          pip install requests beautifulsoup4 cloudscraper

      - name: 파이썬 스크립트 실행
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python .github/workflows/WebCrawlingBot.py

      - name: 마지막 글 번호 깃허브에 저장 (Commit & Push)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add last_id.txt
          # 변경사항(새 글)이 있을 때만 커밋
          git commit -m "Auto-update last_id.txt" || echo "No changes to commit"
          git push
